<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Shashka — 30 davlat</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>Shashka — 30 davlat</h1>

    <div class="bar">
        <div class="flags" id="flags"></div>
        <div class="modes">
            <button id="twoBtn">👥 Ikki o‘yinchi</button>
            <button id="botBtn">🤖 Bot (Oq siz, Qora — bot)</button>
        </div>
    </div>

    <div class="wrap hidden" id="wrap">
        <div class="board-wrap">
            <div id="board" class="board" aria-label="Shashka taxtasi"></div>
        </div>
        <aside class="side">
            <div class="status">
                <div class="tag" id="turnTag">Navbat: Oq</div>
                <div style="display:flex; gap:8px;">
                    <button id="newBtn" class="secondary">Yangi o‘yin</button>
                </div>
            </div>
            <div class="note" id="ruleNote"></div>
            <div class="footer">© <span id="year"></span>. <b>Yaratuvchi: Orziqulov Nurulloh Fayzulla o`g`li</b></div>
        </aside>
    </div>

    <div id="winbar" class="winbar hidden">🎉 G‘alaba!</div>
    <div id="confetti" class="confetti"></div>

    <script src="script.js"></script>
</body>
</html>
