<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mening Soatim</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <link rel="shortcut icon" href="R.jpg" type="image/x-icon">
</head>
<body>
    <div class="container">
        <div class="clock-container">
            <div class="clock">
                <div class="hour-numbers" id="hourNumbers"></div>
                <div class="hour-hand" id="hourHand"></div>
                <div class="minute-hand" id="minuteHand"></div>
                <div class="second-hand" id="secondHand"></div>
                <div class="clock-center"></div>
            </div>
            
            <div class="digital-clock">
                <div class="time-display" id="digitalTime">00:00:00</div>
                <div class="date-display" id="digitalDate">Dushanba, 1 Yanvar 2023</div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
